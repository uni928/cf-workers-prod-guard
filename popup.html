<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudflare Workers 本番警告ガード</title>
  <style>
    body {
      margin: 0;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #fff;
      padding: 16px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    p {
      margin: 0 0 14px;
      line-height: 1.7;
      color: #e5e7eb;
      font-size: 13px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
      background: #fff;
      color: #111827;
    }
  </style>
</head>
<body>
  <h1>本番警告ガード</h1>
  <p>プロジェクト名の登録やメッセージ変更は設定画面から行えます。</p>
  <button id="openOptions">設定画面を開く</button>
  <script src="popup.js"></script>

</html>
